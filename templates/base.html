<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
{% block title %}<title>BlogBoard</title>{% endblock %}
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        "surface-container-high": "#ede7e3",
        "surface-bright": "#fef8f4",
        "surface": "#fef8f4",
        "surface-container-lowest": "#ffffff",
        "primary": "#6b5c4a",
        "on-primary-fixed-variant": "#534434",
        "on-secondary-container": "#6c6359",
        "outline": "#7f756d",
        "on-surface-variant": "#4d453e",
        "surface-dim": "#dfd9d5",
        "inverse-surface": "#32302e",
        "tertiary": "#625e56",
        "on-secondary-fixed": "#211a13",
        "on-error-container": "#93000a",
        "surface-container": "#f3ede9",
        "primary-container": "#dcc7b1",
        "on-tertiary-fixed-variant": "#4a463f",
        "primary-fixed": "#f5dfc8",
        "on-secondary": "#ffffff",
        "on-surface": "#1d1b19",
        "secondary-fixed-dim": "#d1c4b9",
        "surface-container-highest": "#e7e1de",
        "on-primary-container": "#625241",
        "on-tertiary-fixed": "#1e1b15",
        "inverse-on-surface": "#f6f0ec",
        "secondary-fixed": "#eee0d4",
        "tertiary-fixed-dim": "#ccc6bc",
        "secondary-container": "#eee0d4",
        "on-primary": "#ffffff",
        "outline-variant": "#d0c5ba",
        "on-secondary-fixed-variant": "#4e453d",
        "on-error": "#ffffff",
        "background": "#fef8f4",
        "error": "#ba1a1a",
        "surface-variant": "#e7e1de",
        "tertiary-fixed": "#e8e2d8",
        "tertiary-container": "#d0cac0",
        "on-background": "#1d1b19",
        "on-tertiary": "#ffffff",
        "primary-fixed-dim": "#d8c3ad",
        "on-tertiary-container": "#59554d",
        "secondary": "#665d54",
        "surface-tint": "#6b5c4a",
        "error-container": "#ffdad6",
        "surface-container-low": "#f9f2ef",
        "inverse-primary": "#d8c3ad",
        "on-primary-fixed": "#241a0c"
      },
      borderRadius: {
        DEFAULT: "0.25rem",
        lg: "0.5rem",
        xl: "0.75rem",
        full: "9999px"
      },
      spacing: {
        base: "8px",
        "container-max": "1120px",
        sm: "12px",
        xs: "4px",
        lg: "48px",
        gutter: "20px",
        xl: "80px",
        md: "24px"
      },
      fontFamily: {
        "body-lg": ["Plus Jakarta Sans"],
        "body-md": ["Plus Jakarta Sans"],
        "headline-lg": ["Newsreader"],
        "headline-xl": ["Newsreader"],
        "label-sm": ["Plus Jakarta Sans"],
        "headline-md": ["Newsreader"]
      },
      fontSize: {
        "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}],
        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "500"}],
        "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
        "label-sm": ["13px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}]
      }
    }
  }
}
</script>
<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  vertical-align: middle;
}
.editorial-shadow {
  box-shadow: 0 4px 20px -2px rgba(92, 83, 74, 0.08);
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #fef8f4; }
::-webkit-scrollbar-thumb { background: #d0c5ba; border-radius: 10px; }
</style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-stone-100/80 backdrop-blur-md border-b border-stone-200/50 shadow-sm">
<div class="flex justify-between items-center px-5 py-4 max-w-[1120px] mx-auto w-full">
  <a href="/" class="text-2xl font-bold font-serif text-stone-900">BlogBoard</a>
  <nav class="hidden md:flex items-center gap-8 font-serif italic text-lg">
    <a class="text-stone-900 border-b-2 border-stone-400 pb-1" href="/">Explore</a>
  </nav>
  <div class="flex items-center gap-4">
    <a href="/post/new" class="hidden md:flex items-center gap-2 bg-primary text-on-primary px-5 py-2 rounded-full font-label-sm text-label-sm hover:opacity-90 transition-opacity">
      <span class="material-symbols-outlined text-sm">edit</span>
      Write
    </a>
    <a href="/post/new" class="md:hidden">
      <span class="material-symbols-outlined text-stone-800">edit</span>
    </a>
  </div>
</div>
</header>

{% block content %}{% endblock %}

<!-- Footer -->
<footer class="w-full py-12 px-5 mt-auto bg-stone-100 border-t border-stone-200">
<div class="flex flex-col md:flex-row justify-between items-center max-w-[1120px] mx-auto gap-8">
  <div class="text-center md:text-left">
    <div class="font-serif italic text-stone-800 text-xl mb-2">BlogBoard</div>
    <p class="font-serif text-sm text-stone-600">&copy; 2024 BlogBoard Editorial</p>
  </div>
</div>
</footer>

</body>
</html>
